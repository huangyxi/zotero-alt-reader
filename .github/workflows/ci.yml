name: Check and Package

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  check:
    name: Lint and Typecheck
    uses: ./.github/workflows/_check.yml

  package:
    name: Package
    uses: ./.github/workflows/_package.yml

  if-release:
    name: Check result for release
    needs:
      - check
      - package
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Test `check` result
        run: test "${{ needs.check.result }}" = 'success'
      - name: Test `package` result
        run: test "${{ needs.package.result }}" = 'success'

  release:
    name: Create GitHub Release
    needs: if-release
    permissions:
      contents: write
    uses: ./.github/workflows/_release.yml
