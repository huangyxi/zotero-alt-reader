name: Check

permissions:
  contents: read

on:
  workflow_call:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need full history for version calculation in in ./utils/gitinfo.ts
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 'latest'
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        shell: bash
        run: pnpm install
      - name: Lint files
        id: lint
        run: pnpm run lint
      - name: Run TypeScript typecheck
        id: typecheck
        run: pnpm run typecheck
      - name: Build plugin for version calculation
        if: always()
        run: pnpm run build
      - name: Job summary
        if: always()
        run: |
          VERSION=$(jq -r '.version' < "${{ vars.OUTDIR }}/manifest.json" || echo "[VERSION NOT FOUND]")
          status() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              *) echo "⏭️ Skipped" ;;
            esac
          }
          LINT_STATUS="${{ steps.lint.outcome }}"
          TYPECHECK_STATUS="${{ steps.typecheck.outcome }}"
          {
            echo "## Check Results — ${VERSION}"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| 🔍 Lint | $(status "$LINT_STATUS") |"
            echo "| 📝 TypeScript | $(status "$TYPECHECK_STATUS") |"
          } >> "$GITHUB_STEP_SUMMARY"
