name: Release

permissions:
  contents: write

on:
  workflow_call:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          skip-decompress: true
      - name: Release to GitHub
        id: release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            ${{ vars.PLUGIN_NAME }}-*.xpi
            update.json
      - name: Job summary
        if: always()
        run: |
          TAG="${{ github.ref_name }}"
          TMP_DIR=$(mktemp -d)
          PLUGIN_FILE=$(find . -name '*.xpi' | head -n 1)
          if [[ -f "${PLUGIN_FILE}" ]]; then
            unzip "${PLUGIN_FILE}" manifest.json -d "${TMP_DIR}"
            VERSION=$(jq -r '.version' < "${TMP_DIR}/manifest.json")
          else
            echo "Warning: Plugin file '${PLUGIN_FILE}' not found; setting VERSION to 'unknown'." >&2
            VERSION="unknown"
          fi
          rm -rf "${TMP_DIR}"
          REPO_URI="${{ github.server_url }}/${{ github.repository }}"
          RELEASE_URI="${{ steps.release.outputs.url }}"
          DOWNLOAD_LINK="[${PLUGIN_FILE}](${REPO_URI}/releases/download/${TAG}/${PLUGIN_FILE})"
          {
            echo "## 🚀 Released — ${TAG}"
            echo ""
            echo "| Item | Details |"
            echo "| --- | --- |"
            echo "| 🏷️ Tag | \`${TAG}\` |"
            echo "| 📦 Version | \`${VERSION}\` |"
            if [[ -n "${RELEASE_URI}" ]]; then
              echo "| 📋 Release page | [${RELEASE_URI}](${RELEASE_URI}) |"
              echo "| 📥 Download | ${DOWNLOAD_LINK} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
